name: 更新 AltStore 源

on:
  workflow_run:
    workflows: ["完整构建"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-source:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
    - name: 检出仓库
      uses: actions/checkout@v5

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: 记录任务开始时间
      id: job_start_time
      run: echo "start_time=$(date +%s)" >> $GITHUB_OUTPUT

    - name: 更新 AltStore 源
      id: update_source
      env:
        GITHUB_TOKEN: ${{ github.token }}
        GH_TOKEN: ${{ github.token }}
      run: |
        python update_alt_store.py
        git config --global user.name 'GitHub Action'
        git config --global user.email 'action@github.com'
        git add alt_store.json
        if git diff --staged --quiet; then
          echo "changes=false" >> $GITHUB_OUTPUT
        else
          # 为 PR 创建新分支
          branch_name="update-altstore-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$branch_name"
          git commit -m "更新 AltStore 源到最新发布"
          git push -u origin "$branch_name"
          echo "branch_name=$branch_name" >> $GITHUB_OUTPUT
          
          pr_output=$(gh pr create \
            --title "更新 AltStore 源到最新发布" \
            --body "此 PR 会把 alt_store.json 更新到最新发布信息。" \
            --head "$branch_name" \
            --base main 2>&1) || {
            echo "::warning::无法自动创建拉取请求：$pr_output"
            echo "pr_created=false" >> $GITHUB_OUTPUT
            echo "changes=true" >> $GITHUB_OUTPUT
            exit 0
          }
          echo "pr_created=true" >> $GITHUB_OUTPUT
          
          echo "changes=true" >> $GITHUB_OUTPUT
        fi

    - name: 计算任务耗时
      id: duration
      if: always()
      run: |
        end_time=$(date +%s)
        duration=$((end_time - ${{ steps.job_start_time.outputs.start_time }}))
        echo "duration=$duration seconds" >> $GITHUB_OUTPUT

    - name: 生成任务摘要
      run: |
        if [[ "${{ steps.update_source.outputs.changes }}" == "true" ]]; then
          echo "## AltStore 源更新摘要 🚀" >> $GITHUB_STEP_SUMMARY
          echo "✅ 已检测并应用变更" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "alt_store.json 已更新到最新发布信息。" >> $GITHUB_STEP_SUMMARY
          if [[ -n "${{ steps.update_source.outputs.branch_name }}" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "更新分支：\`${{ steps.update_source.outputs.branch_name }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          if [[ "${{ steps.update_source.outputs.pr_created }}" == "false" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "由于工作流令牌没有创建拉取请求的权限，已跳过自动创建 PR。" >> $GITHUB_STEP_SUMMARY
          fi
        else
          echo "## AltStore 源更新摘要 🚀" >> $GITHUB_STEP_SUMMARY
          echo "🔍 未检测到变更" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "alt_store.json 已是最新，无需更新。" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "🕐 执行耗时" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "本任务耗时 ${{ steps.duration.outputs.duration }}。" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "📆 下次运行" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "本工作流会在完整构建成功后运行，也可以手动触发。" >> $GITHUB_STEP_SUMMARY
