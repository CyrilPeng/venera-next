name: 准备 Winget Manifest

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "稳定版发布标签，例如 v1.10.2"
        required: true
        type: string
      submit_pr:
        description: "提交生成的 manifest 到 microsoft/winget-pkgs"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: 解析发布元数据
        id: release
        run: |
          tag="${{ inputs.tag }}"
          version="${tag#v}"
          if [[ "$tag" != v* ]]; then
            echo "::error::tag 必须以 v 开头，当前为 $tag"
            exit 1
          fi
          if [[ "$version" == *-* ]]; then
            echo "::error::Winget manifest 只应为稳定版发布准备"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "url=https://github.com/CyrilPeng/venera-next/releases/download/$tag/VeneraNext-$version-windows-installer.exe" >> "$GITHUB_OUTPUT"
      - name: 下载 Windows 安装包
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          gh release download "${{ steps.release.outputs.tag }}" \
            --pattern "VeneraNext-${{ steps.release.outputs.version }}-windows-installer.exe" \
            --dir dist
      - name: 生成 Winget Manifest
        run: |
          python3 .github/scripts/generate_winget_manifest.py \
            --version "${{ steps.release.outputs.version }}" \
            --installer "dist/VeneraNext-${{ steps.release.outputs.version }}-windows-installer.exe" \
            --release-date "$(date -u +%F)" \
            --output build/winget \
            --print-path
      - uses: actions/upload-artifact@v5
        with:
          name: winget_manifest
          path: build/winget/manifests
          if-no-files-found: error
      - name: 提交 Winget PR
        if: ${{ inputs.submit_pr }}
        env:
          GH_TOKEN: ${{ secrets.WINGET_PKGS_TOKEN }}
        run: |
          if [[ -z "${GH_TOKEN}" ]]; then
            echo "::error::启用 submit_pr 时必须配置 WINGET_PKGS_TOKEN secret"
            exit 1
          fi
          gh repo fork microsoft/winget-pkgs --clone=false || true
          python3 .github/scripts/submit_winget_manifest_pr.py \
            --version "${{ steps.release.outputs.version }}" \
            --manifest-root build/winget/manifests
      - name: 生成摘要
        run: |
          {
            printf '## Winget Manifest\n\n'
            printf '`winget_manifest` 构建产物包含以下命令需要的 manifest 文件：\n\n'
            printf '```powershell\n'
            printf 'winget install CyrilPeng.VeneraNext\n'
            printf 'winget upgrade CyrilPeng.VeneraNext\n'
            printf '```\n\n'
            printf '可以把生成的 manifest 目录提交到 `microsoft/winget-pkgs`；已有 winget 条目后，也可以使用 WingetCreate 更新：\n\n'
            printf '```powershell\n'
            printf 'wingetcreate update CyrilPeng.VeneraNext -u "${{ steps.release.outputs.url }}" -v "${{ steps.release.outputs.version }}" -t <GitHub PAT> --submit\n'
            printf '```\n'
            if [[ "${{ inputs.submit_pr }}" == "true" ]]; then
              printf '\n已启用 `submit_pr`；请在工作流日志中查看创建的 PR 链接。\n'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
