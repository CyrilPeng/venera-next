name: 检查 Issue

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  check:
    name: 检查 Issue
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        id: checkout
        uses: actions/checkout@v5

      - name: 检查 Issue
        id: check
        uses: wgh136/gpt_issue_checker@v1.0.2
        with:
          api-url: ${{ secrets.API_URL }} 
          api-key: ${{ secrets.API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          prompt: "你是仓库 Issue 检查器。本项目是漫画阅读器，支持用户通过配置文件阅读本地或网络漫画。若要阅读网络漫画源，用户必须自行添加配置文件。用户不应在本项目仓库反馈任何与漫画源配置文件有关的问题，因为漫画源配置由其他仓库或用户自行维护。你会收到一个 Issue 内容，需要判断是否关闭该 Issue。如果决定关闭，请同时给出解释原因的评论。如果决定不关闭，请给出该 Issue 的摘要评论。请只返回 JSON 对象，包含以下键：should_close、should_comment、comment。"
          model: "gpt-4o"
